<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Task & Survey System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="student.css">

<meta name="google-adsense-account" content="ca-pub-6814079272498306">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6814079272498306"
crossorigin="anonymous"></script>

<style>
/* Fixed Side Ads */
.ads-left, .ads-right {
    position: fixed;
    top: 150px; /* Distance from top */
    width: 120px;
    z-index: 9999;
}

.ads-left { left: 0; }
.ads-right { right: 0; }

/* Bottom Ad */
.ads-bottom {
    display: block;
    text-align: center;
    margin: 30px auto 0;
}

/* Hide side ads on mobile */
@media(max-width:768px){
    .ads-left, .ads-right { display: none; }
}
</style>
</head>
<body>
<!-- Left Ad -->
<div class="ads-left">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-6814079272498306"
     data-ad-slot="5829190376"
     data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- Right Ad -->
<div class="ads-right">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-6814079272498306"
     data-ad-slot="5829190376"
     data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div class="container">

<h1>🎓 Student Task & Survey System</h1>

<div class="stats">
<div>👥 Students: <span id="totalStudents">0</span></div>
<div>💰 Fees Paid: <span id="totalFees">0</span></div>
<div>📋 Tasks Done: <span id="totalTasks">0</span></div>
<div>📝 Surveys Completed: <span id="totalSurveys">0</span></div>
<button class="reset-btn" onclick="resetGame()">
        <i class="fa-solid fa-rotate-right"></i> Reset
    </button>
</div>

<div class="form">
<input type="text" id="name" placeholder="Student Name">
<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="course" placeholder="Course">
<button onclick="addStudent()" id="addBtn">➕ Add</button>
<button onclick="updateStudent()" id="updateBtn" style="display:none;">🔄 Update</button>
</div>

<input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchStudent()">

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Course</th>
<th>💰 Fee</th>
<th>📋 Task</th>
<th>📊 Survey</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="studentList"></tbody>
</table>
</div>

</div>

<!-- Bottom Ad -->
<div class="ads-bottom">
<ins class="adsbygoogle"
     style="display:block; text-align:center;"
     data-ad-client="ca-pub-6814079272498306"
     data-ad-slot="5829190376"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div style="
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 30px 0;
">
<button onclick="window.location.href='../index.html'" style="
    background: black;
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
" onmouseover="this.style.background='#444'" onmouseout="this.style.background='black'">
    ⬅ Back to Home
</button>
</div>

<script src="student.js"></script>
</body>
</html>
