<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yearly Calendar App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="calendar.css">

<meta name="google-adsense-account" content="ca-pub-6814079272498306">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6814079272498306"
crossorigin="anonymous"></script>

<style>
/* Fixed Side Ads */
.ads-left, .ads-right {
    position: fixed;
    top: 150px;
    width: 120px;
    z-index: 9999;
}

.ads-left { left: 0; }
.ads-right { right: 0; }

/* Bottom Ad */
.ads-bottom {
    display: block;
    text-align: center;
    margin: 30px auto 0;
}

/* Hide side ads on mobile */
@media (max-width: 900px) {
    .ads-left, .ads-right { display: none; }
}
</style>

</head>
<body>

<!-- Left Ad -->
<div class="ads-left">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-6814079272498306"
     data-ad-slot="5829190376"
     data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- Right Ad -->
<div class="ads-right">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-6814079272498306"
     data-ad-slot="5829190376"
     data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div class="calendar-container">
    <button class="reset-btn" onclick="resetCalendar()">
        <i class="fa-solid fa-rotate-right"></i> Reset
    </button>

    <div class="header">
        <div class="nav-group">
            <button onclick="prevYear()"><i class="fa-solid fa-angles-left"></i></button>
            <button onclick="prevMonth()"><i class="fa-solid fa-chevron-left"></i></button>
        </div>

        <h2 id="monthYear"></h2>

        <div class="nav-group">
            <button onclick="nextMonth()"><i class="fa-solid fa-chevron-right"></i></button>
            <button onclick="nextYear()"><i class="fa-solid fa-angles-right"></i></button>
        </div>
    </div>

    <div class="days">
        <div>Sun</div><div>Mon</div><div>Tue</div>
        <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <div id="calendar" class="dates"></div>
</div>

<!-- Add Event Modal -->
<div id="eventModal" class="modal">
    <div class="modal-content">
        <h3>Add Event</h3>
        <input type="text" id="eventTitle" placeholder="Event title">
        <textarea id="eventRemark" placeholder="Remark" rows="3"></textarea>
        <select id="priority">
            <option value="high">High Priority</option>
            <option value="medium" selected>Medium Priority</option>
            <option value="low">Low Priority</option>
        </select>
        <div class="modal-actions">
            <button onclick="saveEvent()">
                <i class="fa-solid fa-floppy-disk"></i> Save
            </button>
            <button class="cancel" onclick="closeModal()">
                <i class="fa-solid fa-xmark"></i> Cancel
            </button>
        </div>
    </div>
</div>

<!-- View Event Modal -->
<div id="viewModal" class="modal">
    <div class="modal-content">
        <h3>Event Details</h3>
        <div id="viewContent"></div>
        <div class="modal-actions">
            <button onclick="deleteEvent()">
                <i class="fa-solid fa-trash"></i> Delete
            </button>
            <button class="cancel" onclick="closeViewModal()">Close</button>
        </div>
    </div>
</div>

<div style="
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 30px 0;
">
    <button 
        onclick="window.location.href='../index.html'" 
        style="
            background: black;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        "
        onmouseover="this.style.background='#444'"
        onmouseout="this.style.background='black'">
        ⬅ Back to Home
    </button>
</div>

<!-- Bottom Ad -->
<div class="ads-bottom">
<ins class="adsbygoogle"
     style="display:block; text-align:center;"
     data-ad-client="ca-pub-6814079272498306"
     data-ad-slot="5829190376"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<script src="calendar.js"></script>
</body>
</html>
