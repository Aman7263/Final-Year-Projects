<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Editor - Swing | Coming Soon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }
        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative; /* for side ads */
            padding: 20px;
        }

        .container {
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .status {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            background-color: #1e293b;
            font-size: 14px;
            letter-spacing: 1px;
            border: 1px solid #334155;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            margin-right: 8px;
            border-radius: 50%;
            background-color: #facc15;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: #64748b;
        }

        /* Fixed Side Ads */
        .ads-left, .ads-right {
            position: fixed;
            top: 150px;
            width: 120px;
            z-index: 9999;
        }
        .ads-left { left: 0; }
        .ads-right { right: 0; }

        /* Bottom Ad */
        .ads-bottom {
            display: block;
            text-align: center;
            margin: 30px auto 0;
        }

        /* Hide side ads on small screens */
        @media (max-width: 768px) {
            .ads-left, .ads-right { display: none; }
        }
    </style>

    <meta name="google-adsense-account" content="ca-pub-6814079272498306">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6814079272498306" crossorigin="anonymous"></script>

</head>
<body>

<!-- Left Ad -->
<div class="ads-left">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-6814079272498306"
     data-ad-slot="5829190376"
     data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- Right Ad -->
<div class="ads-right">
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-6814079272498306"
     data-ad-slot="5829190376"
     data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div class="container">
    <h1>Image Editor - Swing</h1>

    <p>
        This project is currently awaiting hosting / platform availability.
        While we prepare the environment to make it accessible online.
        Please visit another project.
    </p>

    <div class="status">
        <span class="dot"></span>
        Awaiting Hosting Availability
    </div>

    <div style="
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 30px 0;
    ">
        <button onclick="window.location.href='../index.html'" style="
            background: black;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        " onmouseover="this.style.background='#444'" onmouseout="this.style.background='black'">
            ⬅ Back to Home
        </button>
    </div>
</div>

<!-- Bottom Ad -->
<div class="ads-bottom">
<ins class="adsbygoogle"
     style="display:block; text-align:center;"
     data-ad-client="ca-pub-6814079272498306"
     data-ad-slot="5829190376"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

</body>
</html>
